spring.application.name=dfbatch

spring.datasource.url=jdbc:h2:mem:batchdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

app.batch.default-input-file=classpath:data/transactions.csv
app.batch.archive-dir=data/archive
